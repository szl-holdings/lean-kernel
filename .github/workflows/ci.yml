# Lightweight CI for the lean-kernel live verification service.
# WHAT: byte-compiles the FastAPI app + helper modules and imports them so a
#       broken commit can't ship to the HF Docker Space silently.
# WHY:  the heavy Lean/Lake build runs inside the deployed Space (it needs the
#       Mathlib cache and is reported live by /api/lean/build + healthz), so CI
#       here only guards the Python service layer. Honest scope: this does NOT
#       re-run the proofs — that is the kernel's job at runtime.
name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install service deps
        run: pip install -r requirements.txt
      - name: Byte-compile app modules
        run: python -m compileall -q app
      - name: Import smoke test (no Lean build)
        working-directory: app
        run: python -c "import server, lean_numbers, theorem_scan, theorem_registry_guard; print('import OK')"
      # Served-theorem registry guard (stdlib, offline): proves every theorem
      # name app/server.py serves as a confirming theorem resolves to a real
      # Lean declaration in the pinned lutar-lean corpus snapshot. An unbacked
      # served name (absent from the corpus) fails here — never served as proven.
      - name: Served-theorem registry guard — self-test
        run: python app/theorem_registry_guard.py --self-test
      - name: Served-theorem registry guard — repo check
        run: python app/theorem_registry_guard.py
      - name: Served-theorem registry guard — test (stdlib, no pytest dep)
        run: python tests/test_theorem_registry_guard.py
